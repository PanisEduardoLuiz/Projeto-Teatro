<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Minhas Inscrições</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="/frontend/tema/dark-theme.css" id="theme-link">
    <style>
        /* Adicionado para que o link se pareça com um botão */
        .button-link {
            display: inline-block;
            padding: 14px;
            background-color: #28a745;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.3s, transform 0.2s;
        }
        .button-link:hover {
            background-color: #218838;
            transform: translateY(-2px);
            text-decoration: none;
            color: white;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <h2 class="logo">Sistema de Eventos</h2>
            
            <nav class="main-nav">
                <ul>
                    <li><a href="eventos.html">Eventos Disponíveis</a></li>
                    <li><a href="minhas_inscricoes.html" class="active">Minhas Inscrições</a></li>
                    <li><a href="index.html">Sair</a></li>
                </ul>
            </nav>

            <div class="theme-switcher-container">
                <label class="switch">
                    <input type="checkbox" id="theme-switcher">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
    </header>

   <main class="container">
    <h1 id="page-title">Minhas Inscrições</h1>

</main>
