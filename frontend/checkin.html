<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in do Evento</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="tema/dark-theme.css" id="theme-link">
</head>
<body>
    <div class="container">
        <div class="form-container checkin-container">
            <h1>Registro de Presença</h1>
            <div class="input-group">
                <input type="text" id="search-participant" placeholder="Digite o CPF ou Email do participante">
                <button id="search-btn">Buscar</button>
            </div>

            <div id="participant-info" class="hidden">
                <h3>Participante Encontrado</h3>
                <p><strong>Nome:</strong> <span id="participant-name"></span></p>
                <p><strong>Evento:</strong> <span id="participant-event"></span></p>
                <p><strong>Status:</strong> <span id="participant-status"></span></p>
                <button id="checkin-btn" class="checkin-btn">Registrar Presença</button>
            </div>
            
            <p id="search-result-msg" class="search-message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
